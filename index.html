<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>旅途 · TABI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f6f3; --bg2:#efede8; --white:#fff;
  --ink:#1a1a1a; --ink2:#555; --ink3:#888; --ink4:#bbb;
  --line:#e8e7e2; --line2:#d4d3ce;
  --sage:#7c9080; --sage-lt:#edf2ed; --sage-dk:#4e6652;
  --rust:#a06050; --rust-lt:#f5ede9;
  --slate:#5c7080; --slate-lt:#e8edf2;
  --amber:#8a7040; --amber-lt:#f5f0e4;
  --sky:#4a7a90; --sky-lt:#e4f0f5;
  --sh0:0 1px 3px rgba(0,0,0,0.04);
  --sh1:0 2px 10px rgba(0,0,0,0.07);
  --r:8px; --r2:14px;
  --hh:52px; --nh:60px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Noto Sans TC',sans-serif;color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;color-scheme:light;}

/* ── HEADER ── */
header{position:fixed;top:0;left:0;right:0;height:var(--hh);z-index:100;background:rgba(247,246,243,0.94);border-bottom:1px solid var(--line);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.logo{font-family:'Noto Serif TC',serif;font-weight:300;font-size:17px;letter-spacing:0.12em;color:var(--ink);display:flex;align-items:center;gap:8px;}
.logo-div{width:1px;height:12px;background:var(--line2);}
.logo-sub{font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:0.24em;color:var(--ink4);text-transform:uppercase;font-weight:300;}
.sync-pill{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:var(--sage-lt);font-size:10px;color:var(--sage-dk);transition:all .3s;}
.sync-pill.wait{background:var(--amber-lt);color:var(--amber);}
.sync-pill.error{background:var(--rust-lt);color:var(--rust);}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--sage);flex-shrink:0;}
.sync-pill.wait .sdot{background:var(--amber);animation:pulse 1s infinite;}
.sync-pill.error .sdot{background:var(--rust);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.btn-new{background:var(--ink);color:#fff;border:none;padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:500;font-family:'Noto Sans TC',sans-serif;cursor:pointer;white-space:nowrap;transition:background .15s;}
.btn-new:active{background:#333;}
.hamburger{background:none;border:none;cursor:pointer;color:var(--ink);padding:6px;display:flex;flex-direction:column;gap:4px;}
.hamburger span{display:block;width:18px;height:1.5px;background:currentColor;border-radius:1px;}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:258px 1fr;height:100vh;padding-top:var(--hh);background:var(--bg);}
.sidebar{background:var(--white);border-right:1px solid var(--line);overflow-y:auto;padding:18px 10px;}
.sb-lbl{font-size:9px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--ink4);padding:0 8px;margin-bottom:8px;}
.trip-item{padding:11px 10px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;position:relative;margin-bottom:2px;transition:all .15s;}
.trip-item:hover{background:var(--bg);}
.trip-item.active{background:var(--sage-lt);border-color:var(--sage);}
.ti-name{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px;}
.ti-meta{font-size:11px;color:var(--ink3);}
.ti-del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--ink4);cursor:pointer;opacity:0;font-size:11px;padding:3px 6px;border-radius:4px;}
.trip-item:hover .ti-del{opacity:1;}
.ti-del:hover{color:var(--rust);background:var(--rust-lt);}
.sb-empty{text-align:center;padding:36px 12px;color:var(--ink4);font-size:12px;line-height:2.2;}

/* ── MAIN ── */
.main{overflow-y:auto;padding:24px 28px 24px;background:var(--bg);height:calc(100vh - var(--hh));}

/* ── DRAWER ── */
.d-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.22);z-index:200;backdrop-filter:blur(2px);}
.d-mask.open{display:block;}
.drawer{position:fixed;top:0;left:0;bottom:0;width:73vw;max-width:268px;background:var(--white);z-index:201;transform:translateX(-100%);transition:transform .25s cubic-bezier(.3,0,.1,1);padding:58px 10px 90px;overflow-y:auto;}
.drawer.open{transform:none;}
.d-x{position:absolute;top:12px;right:12px;background:none;border:none;font-size:15px;color:var(--ink3);cursor:pointer;padding:6px 9px;}
.d-add{width:100%;margin-top:12px;padding:11px;background:var(--ink);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;letter-spacing:.04em;}

/* ── BOTTOM NAV ── */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);border-top:1px solid var(--line);z-index:100;padding-bottom:env(safe-area-inset-bottom,0);backdrop-filter:blur(10px);}
.bn-row{display:flex;}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 4px;background:none;border:none;font-size:10px;color:var(--ink4);font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:color .15s;letter-spacing:.03em;}
.bn-btn svg{stroke:currentColor;transition:stroke .15s;}
.bn-btn.active{color:var(--sage-dk);}

/* ── WELCOME ── */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;color:var(--ink4);}
.welcome svg{opacity:.25;margin-bottom:16px;}
.welcome h2{font-family:'Noto Serif TC',serif;font-weight:300;font-size:19px;color:var(--ink3);margin-bottom:7px;letter-spacing:.06em;}
.welcome p{font-size:12px;}

/* ── TRIP HEAD ── */
.trip-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:22px;}
.trip-title{font-family:'Noto Serif TC',serif;font-weight:400;font-size:22px;color:var(--ink);margin-bottom:4px;letter-spacing:.02em;}
.trip-meta{font-size:11px;color:var(--ink3);letter-spacing:.03em;line-height:1.8;}
.trip-tz{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;background:var(--slate-lt);color:var(--slate);font-size:10px;font-weight:500;margin-top:2px;}

/* ── WEATHER STRIP ── */
.weather-strip{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.weather-strip::-webkit-scrollbar{display:none;}
.wx-card{flex-shrink:0;background:var(--white);border:1px solid var(--line);border-radius:var(--r2);padding:10px 14px;min-width:68px;text-align:center;box-shadow:var(--sh0);}
.wx-card.today{background:var(--sage-lt);border-color:var(--sage);}
.wx-day{font-size:10px;color:var(--ink3);margin-bottom:4px;letter-spacing:.04em;}
.wx-icon{font-size:20px;margin-bottom:4px;}
.wx-temp{font-size:13px;font-weight:500;color:var(--ink);}
.wx-lo{font-size:10px;color:var(--ink4);}
.wx-load{padding:14px 18px;background:var(--white);border:1px solid var(--line);border-radius:var(--r2);font-size:12px;color:var(--ink4);display:flex;align-items:center;gap:8px;}
.wx-city-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.wx-city-inp{padding:6px 12px;border:1px solid var(--line2);border-radius:20px;font-size:12px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);background:var(--bg);outline:none;width:140px;}
.wx-city-inp:focus{border-color:var(--sage);}
.wx-city-btn{padding:6px 12px;border:1px solid var(--sage);border-radius:20px;background:var(--sage-lt);font-size:12px;color:var(--sage-dk);cursor:pointer;font-family:'Noto Sans TC',sans-serif;}

/* ── SECTION SWITCHER ── */
.sec-bar{display:flex;gap:0;margin-bottom:22px;border:1px solid var(--line2);border-radius:var(--r);overflow:hidden;width:fit-content;}
.sec-btn{padding:7px 18px;border:none;background:var(--white);font-size:12px;font-weight:500;color:var(--ink3);cursor:pointer;font-family:'Noto Sans TC',sans-serif;border-right:1px solid var(--line2);transition:all .15s;letter-spacing:.04em;}
.sec-btn:last-child{border-right:none;}
.sec-btn.active{background:var(--ink);color:#fff;}

/* ── DAY TABS ── */
.day-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{padding:6px 14px;border:1px solid var(--line2);background:var(--white);font-size:11px;font-weight:500;color:var(--ink3);cursor:pointer;border-radius:20px;font-family:'Noto Sans TC',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.day-tab:hover{border-color:var(--sage);color:var(--sage-dk);background:var(--sage-lt);}
.day-tab.active{background:var(--sage);border-color:var(--sage);color:#fff;}
.day-tab.add-tab{border-style:dashed;color:var(--ink4);}
.day-tab.add-tab:hover{border-color:var(--sage);color:var(--sage-dk);background:var(--sage-lt);}

/* ── TIMELINE ── */
.timeline{position:relative;padding-left:38px;}
.timeline::before{content:'';position:absolute;left:12px;top:10px;bottom:10px;width:1px;background:linear-gradient(to bottom,var(--sage) 0%,var(--line) 100%);}

/* ── DRAG HANDLE ── */
.tl-item{position:relative;margin-bottom:12px;animation:in .2s ease both;cursor:default;}
.tl-drag-handle{position:absolute;left:-36px;top:14px;font-size:14px;color:var(--ink4);cursor:grab;user-select:none;padding:2px 4px;border-radius:4px;transition:color .15s;}
.tl-item:hover .tl-drag-handle{color:var(--ink3);}
.tl-drag-handle:active{cursor:grabbing;}

@media(pointer:coarse){.desktop-only{display:none!important;}}
@media(pointer:fine){.mobile-only{display:none!important;}}


@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.tl-dot{position:absolute;left:-29px;top:15px;width:9px;height:9px;border-radius:50%;background:var(--white);border:2px solid var(--sage);box-shadow:0 0 0 3px var(--sage-lt);}
.tl-time{font-size:10px;font-weight:500;color:var(--sage-dk);letter-spacing:.08em;margin-bottom:3px;}
.tl-tz-note{font-size:9px;color:var(--ink4);margin-bottom:3px;font-style:italic;}
.tl-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r2);padding:13px 15px;transition:all .15s;box-shadow:var(--sh0);}
.tl-card:hover{border-color:var(--line2);box-shadow:var(--sh1);}
.tl-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.tl-name{font-size:14px;font-weight:500;color:var(--ink);}
.tl-loc{font-size:11px;color:var(--sky);margin-top:2px;}
.tl-note{font-size:12px;color:var(--ink3);margin-top:9px;line-height:1.6;padding-top:9px;border-top:1px solid var(--line);}
/* ── PHOTO STRIP ── */
.photo-upload-btn2{display:flex;align-items:center;gap:7px;padding:9px 16px;border:1.5px dashed var(--line2);border-radius:var(--r);background:none;font-size:13px;color:var(--ink3);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;margin-top:8px;width:100%;justify-content:center;}
.photo-upload-btn2:hover{border-color:var(--sage);color:var(--sage-dk);background:var(--sage-lt);}
.photo-preview-row{display:flex;flex-wrap:wrap;gap:8px;min-height:4px;}
.photo-thumb-wrap{position:relative;width:72px;height:72px;}
.photo-thumb{width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--line);}
.photo-thumb-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--rust);color:#fff;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;line-height:1;}

.tl-photos{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.tl-photo{width:72px;height:72px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid var(--line);transition:transform .15s;}
.tl-photo:hover{transform:scale(1.05);}
.photo-upload-btn{width:72px;height:72px;border:1.5px dashed var(--line2);border-radius:6px;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink4);font-size:10px;transition:all .15s;flex-shrink:0;}
.photo-upload-btn:hover{border-color:var(--sage);color:var(--sage-dk);background:var(--sage-lt);}
.photo-upload-btn svg{margin-bottom:1px;}
/* lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:8px;object-fit:contain;}
.lb-close{position:fixed;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;padding:8px;opacity:.7;}
.lb-close:hover{opacity:1;}
.lb-del{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--rust);color:#fff;border:none;padding:9px 20px;border-radius:20px;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.tl-tag{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;flex-shrink:0;}
.tag-t{background:var(--slate-lt);color:var(--slate);}
.tag-f{background:var(--amber-lt);color:var(--amber);}
.tag-a{background:var(--sage-lt);color:var(--sage-dk);}
.tag-h{background:#f0edf8;color:#6050a0;}
.tag-o{background:var(--bg2);color:var(--ink3);}
.tl-acts{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;opacity:0;transition:opacity .15s;}
.tl-card:hover .tl-acts{opacity:1;}
@media(pointer:coarse){.tl-acts{opacity:1!important;}}
.add-ev{width:100%;padding:13px 15px;background:none;border:1.5px dashed var(--line2);border-radius:var(--r2);color:var(--ink4);font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;margin-top:8px;text-align:left;}
.add-ev:hover{border-color:var(--sage);color:var(--sage-dk);background:var(--sage-lt);}
.day-theme-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.day-theme-inp{flex:1;background:none;border:none;border-bottom:1.5px solid var(--line2);padding:6px 2px;font-size:15px;font-weight:500;color:var(--ink1);font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .15s;}
.day-theme-inp:focus{border-color:var(--sage);}
.day-theme-inp::placeholder{color:var(--ink4);font-weight:400;}

/* ── SMALL BUTTONS ── */
.bsm{background:none;border:1px solid var(--line2);color:var(--ink3);padding:4px 11px;border-radius:20px;font-size:11px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;}
.bsm:hover{border-color:var(--sage);color:var(--sage-dk);background:var(--sage-lt);}
.bsm.del:hover{border-color:var(--rust);color:var(--rust);background:var(--rust-lt);}
.bsm.nav{background:var(--sky-lt);border-color:var(--sky-lt);color:var(--sky);}
.bsm.nav:hover{background:var(--sky);color:#fff;}
.b-outline{background:var(--white);border:1px solid var(--line2);color:var(--ink2);padding:7px 13px;border-radius:var(--r);font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;}
.b-outline:hover{border-color:var(--ink3);}

/* ── BOOKING PAGE ── */
.booking-section{animation:in .2s ease both;}
.booking-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.bk-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r2);padding:16px;cursor:pointer;transition:all .15s;box-shadow:var(--sh0);position:relative;}
.bk-card:hover{box-shadow:var(--sh1);border-color:var(--line2);}
.bk-type{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.bk-title{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:4px;}
.bk-sub{font-size:11px;color:var(--ink3);line-height:1.7;}
.bk-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:500;margin-top:8px;}
.bk-badge.flight{background:var(--sky-lt);color:var(--sky);}
.bk-badge.hotel{background:var(--amber-lt);color:var(--amber);}
.bk-badge.car{background:var(--sage-lt);color:var(--sage-dk);}
.bk-badge.other{background:var(--bg2);color:var(--ink3);}
.bk-acts{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.exp-acts{display:flex;gap:6px;margin-top:6px;padding-top:6px;border-top:1px solid var(--line);}
@media(pointer:coarse){.bk-acts,.exp-acts{display:flex!important;}}
.add-bk{width:100%;padding:13px 15px;background:none;border:1.5px dashed var(--line2);border-radius:var(--r2);color:var(--ink4);font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;text-align:left;}
.add-bk:hover{border-color:var(--sage);color:var(--sage-dk);background:var(--sage-lt);}
.bk-full{grid-column:1/-1;}

/* ── NOTES ── */
.note-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh0);margin-bottom:10px;}
.note-head{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--bg);}
.nc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.note-t-inp{flex:1;background:none;border:none;font-size:13px;font-weight:500;color:var(--ink);font-family:'Noto Serif TC',serif;outline:none;min-width:0;}
.note-t-inp::placeholder{color:var(--ink4);font-weight:300;}
.note-date-lbl{font-size:10px;color:var(--ink4);white-space:nowrap;}
.note-del{background:none;border:none;color:var(--ink4);cursor:pointer;font-size:11px;padding:2px 5px;}
.note-del:hover{color:var(--rust);}
.note-b-inp{width:100%;min-height:88px;padding:13px 14px;background:none;border:none;resize:vertical;font-size:13px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);line-height:1.9;outline:none;background-image:repeating-linear-gradient(transparent,transparent 28px,var(--line) 28px,var(--line) 29px);background-size:100% 29px;background-position:0 13px;}
.note-b-inp::placeholder{color:var(--ink4);}
.add-note{width:100%;padding:13px 15px;background:none;border:1.5px dashed var(--line2);border-radius:var(--r2);color:var(--ink4);font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;text-align:left;}
.add-note:hover{border-color:var(--sage);color:var(--sage-dk);background:var(--sage-lt);}

/* ── EXPENSES ── */
.cur-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 15px;background:var(--white);border:1px solid var(--line);border-radius:var(--r2);margin-bottom:10px;box-shadow:var(--sh0);}
.cur-lbl{font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ink4);}
.cur-sel{padding:5px 10px;border:1px solid var(--line2);border-radius:20px;font-size:12px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);background:var(--bg);outline:none;cursor:pointer;-webkit-appearance:none;}
.rate-info{margin-left:auto;display:flex;align-items:center;gap:5px;padding:3px 10px;background:var(--bg2);border-radius:20px;font-size:11px;color:var(--ink3);}
.rdot{width:5px;height:5px;border-radius:50%;background:var(--sage);}
.rdot.loading{background:var(--amber);animation:pulse 1s infinite;}
.rdot.error{background:var(--rust);}
.mbr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:12px 15px;background:var(--white);border:1px solid var(--line);border-radius:var(--r2);margin-bottom:10px;box-shadow:var(--sh0);}
.mbr-lbl{font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ink4);}
.m-chip{display:flex;align-items:center;gap:5px;padding:4px 10px 4px 7px;border-radius:20px;background:var(--bg);border:1px solid var(--line2);font-size:12px;color:var(--ink2);}
.m-del-btn{background:none;border:none;color:var(--ink4);cursor:pointer;font-size:10px;padding:0 0 0 2px;line-height:1;}
.m-del-btn:hover{color:var(--rust);}

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const app = initializeApp({
  apiKey:"AIzaSyAixpiTdkQlewF3PVS4oCCCVRYLwmHAIWE",
  authDomain:"my-travel-app-d05f2.firebaseapp.com",
  databaseURL:"https://my-travel-app-d05f2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"my-travel-app-d05f2",
  storageBucket:"my-travel-app-d05f2.firebasestorage.app",
  messagingSenderId:"219881797943",
  appId:"1:219881797943:web:28c5f9693972059bd782b2"
});
const db = getDatabase(app);
const dbRef = ref(db,'trips');

// ══ STATE ══
let S = {trips:[],tid:null,day:0,sec:'itinerary'};
let selType='attraction', selExpCat='food', selParts=[], selBkType='flight';

// ══ TIMEZONES ══
const TIMEZONES = [
  {code:'Asia/Taipei',label:'台灣 UTC+8',abbr:'TST'},
  {code:'Asia/Tokyo',label:'日本 UTC+9',abbr:'JST'},
  {code:'Asia/Seoul',label:'韓國 UTC+9',abbr:'KST'},
  {code:'Asia/Hong_Kong',label:'香港 UTC+8',abbr:'HKT'},
  {code:'Asia/Singapore',label:'新加坡 UTC+8',abbr:'SGT'},
  {code:'Asia/Bangkok',label:'泰國 UTC+7',abbr:'ICT'},
  {code:'Australia/Sydney',label:'澳洲東部 UTC+10/11',abbr:'AEST'},
  {code:'Pacific/Auckland',label:'紐西蘭 UTC+12/13',abbr:'NZST'},
  {code:'Europe/London',label:'英國 UTC+0/+1',abbr:'GMT'},
  {code:'Europe/Paris',label:'歐洲中部 UTC+1/+2',abbr:'CET'},
  {code:'America/New_York',label:'美東 UTC-5/-4',abbr:'EST'},
  {code:'America/Los_Angeles',label:'美西 UTC-8/-7',abbr:'PST'},
  {code:'America/Vancouver',label:'加拿大西部 UTC-8/-7',abbr:'PST'},
];

function getTzAbbr(tz){
  if(!tz)return'TST';
  const t=TIMEZONES.find(t=>t.code===tz);
  return t?t.abbr:tz.split('/').pop();
}
function fmtLocalTime(time,tz){
  if(!time||!tz||tz==='Asia/Taipei')return null;
  try{
    // Build a date string in the destination timezone, then find Taiwan equivalent
    // We treat the input time as local destination time and convert to Taiwan time
    const today=new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD
    // Parse as destination local time using a trick: format a UTC date and find offset
    const destDate=new Date(`${today}T${time}:00`);
    // Get what time it is in dest tz at this UTC moment
    const destStr=new Intl.DateTimeFormat('en-CA',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:tz}).format(destDate);
    // Get what time it is in Taiwan at same UTC moment
    const twStr=new Intl.DateTimeFormat('en-CA',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Taipei'}).format(destDate);
    // The input `time` matches destStr only if we use local date; 
    // Instead just show Taiwan time for same UTC instant that corresponds to local input
    // Compute offset: find UTC time where dest local = input time
    const [h,m]=time.split(':').map(Number);
    // Use Intl to get dest offset relative to UTC at approximate moment
    const base=new Date();base.setUTCHours(12,0,0,0);
    const destAtBase=new Intl.DateTimeFormat('en-CA',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:tz}).format(base);
    const [dh,dm]=destAtBase.split(':').map(Number);
    const twAtBase=new Intl.DateTimeFormat('en-CA',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Taipei'}).format(base);
    const [th,tm]=twAtBase.split(':').map(Number);
    const diffMin=(th*60+tm)-(dh*60+dm); // tw - dest in minutes
    const twMin=((h*60+m+diffMin)%1440+1440)%1440;
    const twH=Math.floor(twMin/60),twM=twMin%60;
    const twTime=`${String(twH).padStart(2,'0')}:${String(twM).padStart(2,'0')}`;
    if(twTime===time&&tz==='Asia/Taipei')return null;
    if(Math.abs(diffMin)===0)return null;
    return`台灣時間 ${twTime}`;
  }catch{return null;}
}

// ══ CURRENCIES ══
const CURRENCIES=[
  {code:'TWD',sym:'NT$',name:'新台幣'},{code:'NZD',sym:'NZ$',name:'紐幣'},
  {code:'JPY',sym:'¥',name:'日圓'},{code:'USD',sym:'$',name:'美元'},
  {code:'EUR',sym:'€',name:'歐元'},{code:'KRW',sym:'₩',name:'韓圜'},
  {code:'HKD',sym:'HK$',name:'港幣'},{code:'GBP',sym:'£',name:'英鎊'},
  {code:'THB',sym:'฿',name:'泰銖'},{code:'SGD',sym:'S$',name:'新幣'},
  {code:'AUD',sym:'A$',name:'澳幣'},{code:'CNY',sym:'¥',name:'人民幣'},
  {code:'MYR',sym:'RM',name:'馬來幣'},{code:'CAD',sym:'C$',name:'加幣'},
  {code:'CHF',sym:'Fr',name:'瑞士法郎'},{code:'VND',sym:'₫',name:'越南盾'},
];
let rates={},rateStatus='loading',ratesAt=null;
const getCurr=c=>CURRENCIES.find(x=>x.code===c)||CURRENCIES[0];
const fmtAmt=(n,c)=>{const x=getCurr(c);return(c==='JPY'||c==='KRW')?x.sym+Math.round(n).toLocaleString():x.sym+Number(n).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2});};
const toTWD=(a,c)=>c==='TWD'?a:(rates[c]?a*rates[c]:null);
const fmtTWD=n=>n!=null?'≈ NT$'+Math.round(n).toLocaleString():'';

async function fetchRates(){
  setRS('loading');
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/TWD');
    const d=await r.json();
    if(d.result==='success'){Object.entries(d.rates).forEach(([k,v])=>{rates[k]=1/v;});rates.TWD=1;ratesAt=new Date();setRS('ok');}
    else setRS('error');
  }catch{setRS('error');}
  renderMain();
}
function setRS(s){
  rateStatus=s;
  const dot=document.getElementById('rateDot'),lbl=document.getElementById('rateLabel');
  if(!dot||!lbl)return;
  dot.className='rdot'+(s==='loading'?' loading':s==='error'?' error':'');
  lbl.textContent=s==='ok'?(ratesAt?`${ratesAt.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})} 更新`:'即時匯率'):s==='loading'?'載入中…':'載入失敗';
}

// ══ WEATHER — Open-Meteo + Geocoding (free, no API key, 7-day forecast) ══
function wxEmoji(code){
  if(code===0)return'☀️';
  if(code<=2)return'⛅';
  if(code<=3)return'☁️';
  if(code<=49)return'🌫';
  if(code<=55)return'🌦';
  if(code<=57)return'🌧';
  if(code<=65)return'🌧';
  if(code<=67)return'🌨';
  if(code<=75)return'❄️';
  if(code<=77)return'❄️';
  if(code<=82)return'🌧';
  if(code<=86)return'❄️';
  if(code<=99)return'⛈';
  return'🌡';
}
let wxCache={};
async function fetchWeather(city,tid){
  if(!city)return;
  const key=`wx_${tid}_${city}`;
  const cached=wxCache[key];
  if(cached&&(Date.now()-cached.ts)<3600000)return;
  try{
    // Step 1: Geocoding — city name → lat/lon
    const geoUrl=`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=zh&format=json`;
    const geoR=await fetch(geoUrl);
    const geoD=await geoR.json();
    if(!geoD.results?.length) throw new Error('city not found');
    const {latitude,longitude,name,country}=geoD.results[0];

    // Step 2: 7-day forecast
    const wxUrl=`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7`;
    const wxR=await fetch(wxUrl);
    const wxD=await wxR.json();
    const daily=wxD.daily;
    const days=daily.time.map((dateStr,i)=>{
      const dt=new Date(dateStr+'T12:00:00');
      return{
        hi:Math.round(daily.temperature_2m_max[i]),
        lo:Math.round(daily.temperature_2m_min[i]),
        icon:wxEmoji(daily.weathercode[i]),
        dt
      };
    });
    wxCache[key]={ts:Date.now(),days,cityName:`${name}, ${country}`};
    renderMain();
  }catch(e){
    wxCache[key]={ts:Date.now(),days:null,error:true};
    renderMain();
    console.warn('Weather fetch failed',e);
  }
}
window.fetchWeather=fetchWeather;

// ══ HELPERS ══
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtD=(s,e)=>{if(!s)return'未設定';const f=d=>`${d.getMonth()+1}/${d.getDate()}`;return`${f(new Date(s))} – ${f(new Date(e||s))}`;};
const dCnt=(s,e)=>(!s||!e)?1:Math.max(1,Math.round((new Date(e)-new Date(s))/86400000)+1);
const dLbl=(t,i)=>{if(!t.startDate)return`Day ${i+1}`;const d=new Date(t.startDate);d.setDate(d.getDate()+i);return`${d.getMonth()+1}/${d.getDate()}`;};
const today=()=>new Date().toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'});
const AVC=['#7a6e5a','#5a7a6a','#5a6e8a','#7a5a8a','#8a7a5a','#5a8a7a','#7a5a6a','#6a7a5a'];
const avc=n=>{let h=0;for(let c of(n||''))h=(h*31+c.charCodeAt(0))%AVC.length;return AVC[h];};
const avEl=(n,sz=20,trip=null)=>{
  const t=trip||S.trips.find(t=>t.id===S.tid);
  const m=t?.memberData?.[n];
  if(m?.avatar)return`<img src="${m.avatar}" style="width:${sz}px;height:${sz}px;border-radius:50%;object-fit:cover;flex-shrink:0" alt="${n}"/>`;

};

function setSS(s,l){
  const p=document.getElementById('syncPill');

// ══ SAVE ══
async function save(){
  setSS('wait','儲存中');
  try{
    const obj={};S.trips.forEach(t=>{obj[t.id]=t;});
    await set(dbRef,obj);
    setSS('','即時同步');
  }catch(e){setSS('error','同步失敗');}
}

// ══ REALTIME ══
onValue(dbRef,snap=>{

// ── REORDER ──
let dragSrcIdx=null;
// Touch drag state
let touchDragIdx=null, touchDragEl=null, touchGhost=null, touchStartY=0, touchDragging=false, touchLongTimer=null;


// ── Mobile touch drag (long-press card 500ms → drag) ──
window.tlTouchStart=(e,idx)=>{
  if(e.target.closest('button,a,input,textarea,.tl-menu-pop'))return;
  touchStartY=e.touches[0].clientY;
  touchLongTimer=setTimeout(()=>{
    touchDragging=true;
    touchDragIdx=idx;
    touchDragEl=e.currentTarget;
    const rect=touchDragEl.getBoundingClientRect();
    touchGhost=touchDragEl.cloneNode(true);
    touchGhost.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${touchDragEl.offsetWidth}px;opacity:.75;pointer-events:none;z-index:999;transform:scale(1.03);box-shadow:0 8px 32px rgba(0,0,0,.18);border-radius:12px;`;
    document.body.appendChild(touchGhost);
    touchDragEl.style.opacity='.3';
    navigator.vibrate&&navigator.vibrate(40);
  },500);
};
window.tlTouchMove=(e,idx)=>{
  const dy=Math.abs(e.touches[0].clientY-touchStartY);
  if(!touchDragging){
    if(dy>8){clearTimeout(touchLongTimer);touchLongTimer=null;}
    return;
  }
  e.preventDefault();
  const t=e.touches[0];
  if(touchGhost)touchGhost.style.top=(t.clientY-touchDragEl.offsetHeight/2)+'px';
  // Highlight drop target
  document.querySelectorAll('.tl-item').forEach(el=>{el.style.borderTop='';el.style.borderBottom='';});
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const target=el?.closest('.tl-item');
  if(target&&target!==touchDragEl){
    const tIdx=parseInt(target.dataset.idx);
    if(tIdx<touchDragIdx)target.style.borderTop='3px solid var(--sage)';
    else target.style.borderBottom='3px solid var(--sage)';
  }
};
window.tlTouchEnd=(e,idx)=>{
  clearTimeout(touchLongTimer);touchLongTimer=null;
  if(!touchDragging){touchDragging=false;return;}
  if(touchGhost){touchGhost.remove();touchGhost=null;}
  if(touchDragEl)touchDragEl.style.opacity='1';
  document.querySelectorAll('.tl-item').forEach(el=>{el.style.borderTop='';el.style.borderBottom='';});
  const t2=e.changedTouches[0];
  const el=document.elementFromPoint(t2.clientX,t2.clientY);
  const target=el?.closest('.tl-item');
  const targetIdx=target?parseInt(target.dataset.idx):null;
  if(targetIdx!==null&&targetIdx!==touchDragIdx){
    const tr=S.trips.find(t=>t.id===S.tid);if(tr){
      const evs=tr.days[S.day]||[];
      const [moved]=evs.splice(touchDragIdx,1);
      evs.splice(targetIdx,0,moved);
      tr.days[S.day]=evs;save();
    }
  }
  touchDragging=false;touchDragIdx=null;touchDragEl=null;
};

window.submitCopyEv=(evId)=>{

window.moveEv=(idx,dir)=>{
  const t=S.trips.find(t=>t.id===S.tid);if(!t)return;
  const evs=t.days[S.day]||[];const ni=idx+dir;
  if(ni<0||ni>=evs.length)return;
  [evs[idx],evs[ni]]=[evs[ni],evs[idx]];t.days[S.day]=evs;save();
};

// Desktop: drag handle is draggable="true", triggers native drag
window.tlDragStart=(e,idx)=>{
  dragSrcIdx=idx;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',idx);
  // Delay opacity so drag image captures properly
  setTimeout(()=>{ e.target.closest('.tl-item').style.opacity='.4'; }, 0);
};
window.tlDragEnd=(e)=>{
  e.target.closest('.tl-item').style.opacity='1';
  dragSrcIdx=null;
};
window.tlDragOver=(e)=>{e.preventDefault();e.dataTransfer.dropEffect='move';};
window.tlDrop=(e,targetIdx)=>{
  e.preventDefault();
  if(dragSrcIdx===null||dragSrcIdx===targetIdx)return;
  const t=S.trips.find(t=>t.id===S.tid);if(!t)return;
  const evs=t.days[S.day]||[];
  const [moved]=evs.splice(dragSrcIdx,1);evs.splice(targetIdx,0,moved);
  t.days[S.day]=evs;dragSrcIdx=null;save();
};

function calcSettle(trip){
  const ms=trip.members||[],es=trip.expenses||[],bc=trip.currency||'TWD';
  if(!ms.length||!es.length)return`<div class="settle-title">結算總覽</div><div class="no-settle" style="background:var(--bg);color:var(--ink4)">新增成員與消費後計算</div>`;
  let totalTWD=0;const bal={};ms.forEach(m=>bal[m]=0);
  es.forEach(e=>{const a=toTWD(Number(e.amount||0),e.currency||bc)||Number(e.amount||0);totalTWD+=a;const ps=e.participants?.length?e.participants:ms;const sh=a/ps.length;bal[e.payer]=(bal[e.payer]||0)+a;ps.forEach(p=>{bal[p]=(bal[p]||0)-sh;});});
  const cr=[],dt=[];Object.entries(bal).forEach(([n,b])=>{if(b>.5)cr.push({n,b});else if(b<-.5)dt.push({n,b:-b});});
  cr.sort((a,b)=>b.b-a.b);dt.sort((a,b)=>b.b-a.b);
  const st=[];const c2=cr.map(x=>({...x})),d2=dt.map(x=>({...x}));let ci=0,di=0;
  while(ci<c2.length&&di<d2.length){const a=Math.min(c2[ci].b,d2[di].b);st.push({from:d2[di].n,to:c2[ci].n,aTWD:a});c2[ci].b-=a;d2[di].b-=a;if(c2[ci].b<.5)ci++;if(d2[di].b<.5)di++;}
  const toBase=n=>{if(bc==='TWD')return n;const r=rates[bc];return r?n/r:n;};
  const rows=st.length?st.map(s=>`<div class="settle-row">${avEl(s.from)}<span class="sf">${esc(s.from)}</span><span style="color:var(--ink4);font-size:11px">→</span>${avEl(s.to)}<span class="st">${esc(s.to)}</span><div class="sa">${fmtAmt(Math.round(toBase(s.aTWD)),bc)}${bc!=='TWD'?` <span class="ss">${fmtTWD(s.aTWD)}</span>`:''}</div></div>`).join(''):`<div class="no-settle">✓ 已全部結清</div>`;
  return`<div class="settle-title">結算總覽</div><div class="settle-sub">統一以新台幣匯算</div>
    <div class="sum-stats">
      <div class="stat-b"><div class="stat-l">總消費</div><div class="stat-v">${fmtAmt(Math.round(toBase(totalTWD)),bc)}</div>${bc!=='TWD'?`<div class="stat-s">${fmtTWD(totalTWD)}</div>`:''}</div>
      <div class="stat-b"><div class="stat-l">每人均攤</div><div class="stat-v">${fmtAmt(Math.round(toBase(totalTWD/(ms.length||1))),bc)}</div></div>
      <div class="stat-b"><div class="stat-l">筆數</div><div class="stat-v">${es.length}</div></div>
    </div>
    <div class="settle-lbl">轉帳清單</div>${rows}`;
}

function renderNotes(trip){
  if(!trip.notes)trip.notes=[];
  const cards=trip.notes.map(n=>`<div class="note-card"><div class="note-head"><div class="nc-dot" style="background:${n.color||'var(--sage)'}"></div><input class="note-t-inp" value="${esc(n.title)}" placeholder="標題" oninput="updateNote('${n.id}','title',this.value)"/><span class="note-date-lbl">${n.date||''}</span><button class="note-del" onclick="delNote('${n.id}')">✕</button></div><textarea class="note-b-inp" placeholder="記下想法、待辦、重要資訊…" oninput="updateNote('${n.id}','body',this.value)">${esc(n.body||'')}</textarea></div>`).join('');
  return`<div>${cards}<button class="add-note" onclick="addNote()">＋ 新增筆記</button></div>`;
}

// ══ CLOUDINARY UPLOAD ══
const CLOUD_NAME='dhwygotr5';
const UPLOAD_PRESET='1234566';

window.triggerCloudUpload=(previewId)=>{
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=async()=>{
    const uploading=document.getElementById('fepUploading');
    if(uploading)uploading.style.display='block';
    for(const file of inp.files){
      try{
        const fd=new FormData();
        fd.append('file',file);
        fd.append('upload_preset',UPLOAD_PRESET);
        const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:'POST',body:fd});
        const data=await res.json();
        if(data.secure_url){
          addThumbToPreview(previewId, data.secure_url);
        }
      }catch(e){alert('上傳失敗，請檢查網路');}
    }
    if(uploading)uploading.style.display='none';
  };
  inp.click();
};

function addThumbToPreview(previewId, url){
  const preview=document.getElementById(previewId);
  if(!preview)return;
  // Update hidden input
  const hidden=document.getElementById('fep');
  const existing=hidden.value?hidden.value.split('|').filter(Boolean):[];
  existing.push(url);
  hidden.value=existing.join('|');
  // Add thumb
  const wrap=document.createElement('div');wrap.className='photo-thumb-wrap';
  const img=document.createElement('img');img.src=url;img.className='photo-thumb';
  const del=document.createElement('button');del.type='button';del.className='photo-thumb-del';del.textContent='✕';
  del.onclick=()=>{
    const urls=hidden.value.split('|').filter(u=>u!==url);
    hidden.value=urls.join('|');
    wrap.remove();
  };
  wrap.appendChild(img);wrap.appendChild(del);preview.appendChild(wrap);
}

window.removeThumb=(btn,hidId,idx)=>{
  const hidden=document.getElementById(hidId);
  const urls=hidden.value.split('|').filter(Boolean);
  urls.splice(idx,1);
  hidden.value=urls.join('|');
  btn.closest('.photo-thumb-wrap').remove();
};

// ══ PHOTO SYSTEM (localStorage, local only) ══
function getPhotoKey(evId){return`tabi_photos_${evId}`;}
function loadPhotos(evId){
  try{return JSON.parse(localStorage.getItem(getPhotoKey(evId))||'[]');}
  catch{return[];}
}
function savePhotos(evId,photos){
  try{localStorage.setItem(getPhotoKey(evId),JSON.stringify(photos));}
  catch(e){alert('照片儲存失敗，空間可能不足');}
}
function renderPhotoStrip(evId,urlPhotos){
  // Only show URL-based photos (synced via Firebase, visible to everyone)
  const photos=urlPhotos||[];
  if(!photos.length)return'';
  const imgs=photos.map((url,i)=>
    `<img class="tl-photo" src="${url}" onerror="this.style.display='none'" onclick="openLightboxUrl('${evId}',${i},'url')" alt="photo"/>`
  ).join('');
  return`<div class="tl-photos">${imgs}</div>`;
}
window.triggerPhotoUpload=(evId)=>{
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=async()=>{
    const photos=loadPhotos(evId);
    for(const file of inp.files){
      const compressed=await compressImage(file,800,0.75);
      photos.push(compressed);
    }
    savePhotos(evId,photos);
    renderMain();
  };
  inp.click();
};
function compressImage(file,maxPx,quality){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxPx||h>maxPx){const r=Math.min(maxPx/w,maxPx/h);w=Math.round(w*r);h=Math.round(h*r);}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
let lbEvId=null,lbIdx=null,lbSource=null;
window.openLightboxUrl=(evId,idx,source)=>{
  lbEvId=evId;lbIdx=idx;lbSource=source;
  let src;
  if(source==='url'){
    const t=S.trips.find(t=>t.id===S.tid);
    const ev=(t?.days[S.day]||[]).find(e=>e.id===evId);
    src=(ev?.photoUrls||[])[idx];
  } else {
    src=loadPhotos(evId)[idx];
  }
  if(!src)return;
  document.getElementById('lbImg').src=src;
  // Show delete button only for local photos; URL photos are deleted via edit modal
  document.getElementById('lbDel').style.display=source==='local'?'block':'none';
  document.getElementById('lightbox').classList.add('open');
};
window.closeLightbox=()=>{
  document.getElementById('lightbox').classList.remove('open');
  lbEvId=null;lbIdx=null;lbSource=null;
};
window.deletePhoto=async()=>{
  if(lbEvId===null||lbIdx===null)return;
  if(!await showConfirm('刪除照片？','此照片將從本機永久刪除'))return;
  if(lbSource==='local'){
    const photos=loadPhotos(lbEvId);
    photos.splice(lbIdx,1);
    savePhotos(lbEvId,photos);
  }
  closeLightbox();
  renderMain();
};
// ── CUSTOM CONFIRM ──
let confirmResolve=null;
function showConfirm(msg,sub=''){
  return new Promise(resolve=>{
    confirmResolve=(v)=>{
      document.getElementById('confirmDlg').style.display='none';
      resolve(v);
    };
    document.getElementById('confirmMsg').textContent=msg;
    document.getElementById('confirmSub').textContent=sub;
    const dlg=document.getElementById('confirmDlg');
    dlg.style.display='flex';
  });
}
window.confirmResolve=(v)=>{
  document.getElementById('confirmDlg').style.display='none';
  if(confirmResolve)confirmResolve(v);
};
